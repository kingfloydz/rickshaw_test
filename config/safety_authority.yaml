schema_version: 1
authority_id: g1-rickshaw-safety-acceptance-2026-07-15
provenance:
  method: >-
    Independent pre-scan acceptance authority. Values are engineering safety
    limits tied to the implementation guide and the pinned 19-slope
    reset-alignment evidence; the candidate feasibility envelope is deliberately
    not a provenance source.
source_files:
  implementation_guide:
    path: ../G1_Rickshaw_IsaacLab_Implementation_Guide.md
  reset_pose_library:
    path: reset_poses.yaml
  reset_alignment:
    path: ../outputs/validation/reset_alignment_1000.json
thresholds:
  safety.theta_max:
    value: 0.8
    sources: [implementation_guide, reset_pose_library, reset_alignment]
    rationale: Bounds continuous torso tilt above the pinned 19-slope standing maximum.
  safety.illegal_contact_force_threshold:
    value: 5.0
    sources: [implementation_guide]
    rationale: Contact rejection floor for the configured robot collision groups.
  safety.robot_cart_contact_force_threshold:
    value: 5.0
    sources: [implementation_guide]
    rationale: Contact rejection floor outside the two authorized grasp interfaces.
  safety.cart_ground_contact_force_threshold:
    value: 5.0
    sources: [implementation_guide]
    rationale: Contact rejection floor for non-wheel cart geometry touching terrain.
  safety.minimum_wheel_normal_force:
    value: 25.0
    sources: [implementation_guide]
    rationale: Conservative two-wheel lift margin for the configured wheel geometry and mass.
  safety.min_ground_reaction:
    value: 100.0
    sources: [implementation_guide]
    rationale: Minimum support reaction below which ZMP evidence is invalid.
  safety.d6_residual_limit:
    value: 0.06
    sources: [implementation_guide, reset_pose_library, reset_alignment]
    rationale: Conservative margin above the pinned reset rollout residual peak.
  safety.d6_impulse_limit:
    value: 1.7
    sources: [implementation_guide, reset_pose_library, reset_alignment]
    rationale: Conservative margin above the pinned direct-reset rollout impulse peak.
  safety.hitch_height_bounds:
    value: [0.70, 0.95]
    sources: [implementation_guide, reset_pose_library, reset_alignment]
    rationale: Persistent hitch-height acceptance envelope around the 0.85 m fixed-vehicle target.
  safety.rickshaw_pitch_bounds:
    value: [0.15, 0.45]
    sources: [implementation_guide, reset_pose_library, reset_alignment]
    rationale: Persistent cart-pitch envelope covering the configured 19-slope reset set.
  safety.corridor_half_width:
    value: 0.3
    sources: [implementation_guide]
    rationale: Section 11 acceptance corridor; changing it requires revalidation and retraining.
  safety.heading_error_limit:
    value: 0.3
    sources: [implementation_guide]
    rationale: Section 11 heading envelope; changing it requires revalidation and retraining.
  safety.overspeed_margin:
    value: 0.25
    sources: [implementation_guide]
    rationale: Section 11 overspeed acceptance margin in meters per second.
  safety.arm_torque_limit:
    value: 1.0
    sources: [implementation_guide, reset_pose_library, reset_alignment]
    rationale: Hardware actuator effort limit; reset preload uses the fixed 0.86 torque-limit fraction.
